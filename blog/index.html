---
layout: default
title: 观点 · 涛talk
description: 涛talk关于新媒体、AI 与增长的持续思考。
---
<div class="section">
  <div class="container">
    <div class="section__head">
      <span class="section__tag">观点</span>
      <h2 class="section__title">全部文章</h2>
    </div>

    <div class="posts">
      {% for post in site.posts %}
      <a href="{{ post.url }}" class="post">
        <span class="post__date">{{ post.date | date: "%Y-%m-%d" }}</span>
        <h3 class="post__title">{{ post.title }}</h3>
        <p class="post__excerpt">{{ post.excerpt | strip_html | truncate: 50 }}</p>
        <span class="post__more">阅读全文 →</span>
      </a>
      {% endfor %}
    </div>

    <div class="center" style="margin-top:32px">
      <a href="/" class="btn btn--ghost">← 返回首页</a>
    </div>
  </div>
</div>
